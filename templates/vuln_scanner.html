<!DOCTYPE html>
<html>
<head>
<title>Vulnerability Scanner - Sentinel SOC</title>
<script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
<style>
  :root {
    --bg: #0f1117; --panel: #161b22; --border: #30363d;
    --accent: #58a6ff; --accent2: #79c0ff; --text: #e6edf3;
    --subtext: #8b949e; --red: #f85149; --orange: #d29922;
    --yellow: #e3b341; --green: #3fb950;
  }
  * { box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',monospace; margin:0; padding:20px; font-size:13px; }
  h1 { color:var(--text); border-bottom:1px solid var(--border); padding-bottom:12px; margin-bottom:12px; font-size:20px; font-weight:600; letter-spacing:1px; }
  .grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-top:16px; }
  .panel { background:var(--panel); border:1px solid var(--border); border-radius:8px; padding:16px; }
  .panel h2 { margin-top:0; font-size:11px; color:var(--subtext); text-transform:uppercase; letter-spacing:2px; font-weight:600; margin-bottom:12px; }
  .alert-card { padding:10px 12px; margin:6px 0; border-radius:6px; font-size:12px; line-height:1.5; }
  .CRITICAL { background:#3d1c1c; border-left:3px solid var(--red); color:#ffa198; }
  .HIGH     { background:#2d2008; border-left:3px solid var(--orange); color:#e3b341; }
  .MEDIUM   { background:#1f2d0e; border-left:3px solid var(--green); color:#7ee787; }
  .LOW      { background:#0d1f2d; border-left:3px solid var(--accent); color:#79c0ff; }
  .INFO     { background:#161b22; border-left:3px solid var(--border); color:var(--subtext); }
  .response-card { padding:8px 10px; margin:5px 0; border-radius:4px; font-size:11px; }
  .response-ok   { background:#0d1f0e; border-left:3px solid var(--green); color:#7ee787; }
  .response-fail { background:#1c0d0d; border-left:3px solid var(--red); color:#ffa198; }
  .agent-card { padding:8px 10px; margin:5px 0; border-radius:4px; font-size:11px; background:#1c2128; border-left:3px solid var(--accent); }
  .intel-card { padding:10px 12px; margin:6px 0; border-radius:6px; font-size:11px; background:#1c2128; border:1px solid var(--border); }
  .intel-name { font-size:13px; font-weight:600; color:var(--text); margin-bottom:6px; }
  .intel-stat { display:inline-block; margin-right:14px; color:var(--subtext); }
  .intel-stat b { color:var(--accent2); }
  .mitre-card { padding:10px 12px; margin:6px 0; border-radius:6px; font-size:11px; background:#1c2128; border:1px solid var(--border); }
  .mitre-id { display:inline-block; padding:2px 8px; border-radius:4px; font-size:10px; font-weight:700; margin-right:8px; background:#0d1f2d; color:var(--accent); border:1px solid var(--accent); }
  .mitre-critical { border-left:3px solid var(--red); }
  .mitre-high { border-left:3px solid var(--orange); }
  .mitre-medium { border-left:3px solid var(--green); }
  .badge { display:inline-block; padding:1px 6px; border-radius:12px; font-size:10px; margin:0 2px; font-weight:600; }
  .badge-red    { background:#3d1c1c; color:#ffa198; border:1px solid #f8514966; }
  .badge-orange { background:#2d2008; color:#e3b341; border:1px solid #d2992266; }
  .badge-yellow { background:#1f2d0e; color:#7ee787; border:1px solid #3fb95066; }
  .badge-green  { background:#0d1f2d; color:#79c0ff; border:1px solid #58a6ff66; }
  .timeline-item { padding:5px 0; border-bottom:1px solid var(--border); font-size:11px; color:var(--subtext); }
  .timeline-item b { color:var(--accent); }
  .geo-item { padding:5px 0; border-bottom:1px solid var(--border); font-size:11px; }
  .risk-bar-wrap { margin:5px 0; }
  .risk-bar-label { font-size:11px; margin-bottom:2px; }
  .risk-bar-bg { background:#21262d; border-radius:4px; height:8px; }
  .risk-bar-fill { height:8px; border-radius:4px; transition:width 0.5s; }
  .stat { font-size:26px; font-weight:700; }
  .stat-label { font-size:10px; color:var(--subtext); margin-top:2px; text-transform:uppercase; letter-spacing:1px; }
  .stats-row { display:grid; grid-template-columns:1fr 1fr 1fr 1fr 1fr; gap:12px; margin-bottom:16px; }
  .stat-box { background:var(--panel); border:1px solid var(--border); border-radius:8px; padding:14px; text-align:center; }
  #map-frame { width:100%; height:400px; border:none; border-radius:6px; }
  .btn { background:#1c2128; border:1px solid var(--accent); color:var(--accent); padding:7px 18px; border-radius:6px; cursor:pointer; font-family:inherit; font-size:12px; margin-bottom:14px; font-weight:600; }
  .btn:hover { background:#21262d; }
</style>
</head>
<body><script src="/static/nav.js"></script>

<div class="sentinel-page" id="vuln-scanner">
  <div class="page-header">
    <div><h1>Vulnerability Scanner</h1><p class="subtitle">Port scan &rarr; CVE lookup &rarr; MITRE ATT&CK mapping</p></div>
    <div class="header-badges" id="severity-summary" style="display:none">
      <span class="badge badge-critical" id="badge-critical">0 Critical</span>
      <span class="badge badge-high" id="badge-high">0 High</span>
      <span class="badge badge-medium" id="badge-medium">0 Medium</span>
      <span class="badge badge-low" id="badge-low">0 Low</span>
    </div>
  </div>
  <div class="card scan-form">
    <div class="form-row">
      <div class="form-group">
        <label for="target-input">Target IP / Hostname</label>
        <input type="text" id="target-input" placeholder="192.168.1.1 or hostname" autocomplete="off"/>
      </div>
      <div class="form-group">
        <label for="range-select">Port Range</label>
        <select id="range-select">
          <option value="common">Common ports (fast)</option>
          <option value="1-1024">Well-known (1-1024)</option>
          <option value="full">Full top-1000 (slow)</option>
          <option value="custom">Custom...</option>
        </select>
      </div>
      <div class="form-group" id="custom-range-group" style="display:none">
        <label for="custom-range">Custom ports</label>
        <input type="text" id="custom-range" placeholder="80,443,8080 or 1-500"/>
      </div>
      <button class="btn-primary" id="scan-btn" onclick="startScan()">&#9654; Start Scan</button>
    </div>
  </div>
  <div class="card" id="progress-card" style="display:none">
    <div class="progress-header"><span id="progress-label">Initializing...</span><span id="progress-pct">0%</span></div>
    <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <div class="progress-stages">
      <span class="stage" id="stage-port">&#9675; Port scan</span>
      <span class="stage" id="stage-cve">&#9675; CVE lookup</span>
      <span class="stage" id="stage-risk">&#9675; Risk scoring</span>
      <span class="stage" id="stage-done">&#9675; Complete</span>
    </div>
  </div>
  <div class="card" id="ports-card" style="display:none">
    <h2>Open Ports <span class="count-pill" id="ports-count">0</span></h2>
    <div class="port-chips" id="port-chips"></div>
  </div>
  <div class="card" id="findings-card" style="display:none">
    <div class="card-header-row">
      <h2>Vulnerability Findings</h2>
      <div class="filter-row">
        <button class="filter-btn active" onclick="filterFindings('all',this)">All</button>
        <button class="filter-btn" onclick="filterFindings('CRITICAL',this)">Critical</button>
        <button class="filter-btn" onclick="filterFindings('HIGH',this)">High</button>
        <button class="filter-btn" onclick="filterFindings('MEDIUM',this)">Medium</button>
        <button class="filter-btn" onclick="filterFindings('LOW',this)">Low</button>
      </div>
    </div>
    <div id="findings-container"></div>
    <button class="btn-secondary" id="report-btn" style="display:none" onclick="downloadReport()">&#8659; Download PDF Report</button>
  </div>
</div>
<style>
.sentinel-page{max-width:1100px;margin:0 auto;padding:1.5rem}
.page-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1.5rem;flex-wrap:wrap;gap:.75rem}
.page-header h1{font-size:1.6rem;font-weight:600;margin:0}
.subtitle{color:#888;font-size:.9rem;margin:.2rem 0 0}
.card{background:var(--card-bg,#1a1d23);border:1px solid var(--border,#2a2d35);border-radius:10px;padding:1.25rem;margin-bottom:1rem}
.card h2{font-size:1rem;font-weight:600;margin:0 0 1rem}
.form-row{display:flex;gap:.75rem;align-items:flex-end;flex-wrap:wrap}
.form-group{display:flex;flex-direction:column;gap:.35rem;flex:1;min-width:160px}
.form-group label{font-size:.78rem;color:#aaa;text-transform:uppercase;letter-spacing:.05em}
.form-group input,.form-group select{background:#111316;border:1px solid #2e3138;border-radius:6px;color:#e0e0e0;padding:.5rem .75rem;font-size:.9rem;outline:none}
.btn-primary{background:#1d6fe5;color:#fff;border:none;border-radius:6px;padding:.6rem 1.2rem;font-size:.9rem;font-weight:500;cursor:pointer;white-space:nowrap}
.btn-primary:disabled{background:#333;color:#666;cursor:not-allowed}
.btn-secondary{background:transparent;border:1px solid #3a3d45;color:#ccc;border-radius:6px;padding:.5rem 1rem;cursor:pointer;font-size:.85rem;margin-top:1rem}
.header-badges{display:flex;gap:.5rem;flex-wrap:wrap}
.badge{padding:.3rem .75rem;border-radius:20px;font-size:.78rem;font-weight:600}
.badge-critical{background:rgba(220,50,47,.18);color:#ff5f57;border:1px solid rgba(220,50,47,.3)}
.badge-high{background:rgba(220,120,30,.18);color:#ff9f43;border:1px solid rgba(220,120,30,.3)}
.badge-medium{background:rgba(220,200,30,.18);color:#ffd43b;border:1px solid rgba(220,200,30,.3)}
.badge-low{background:rgba(80,200,120,.18);color:#51cf66;border:1px solid rgba(80,200,120,.3)}
.progress-header{display:flex;justify-content:space-between;margin-bottom:.5rem;font-size:.85rem;color:#ccc}
.progress-track{background:#111316;border-radius:4px;height:8px;overflow:hidden}
.progress-fill{height:100%;background:#1d6fe5;border-radius:4px;transition:width .4s ease}
.progress-stages{display:flex;gap:1.5rem;margin-top:.75rem;font-size:.78rem;color:#666}
.stage.active{color:#4a9eff}.stage.done{color:#51cf66}
.port-chips{display:flex;flex-wrap:wrap;gap:.4rem}
.port-chip{background:#111316;border:1px solid #2e3138;border-radius:6px;padding:.3rem .65rem;font-size:.8rem;color:#ccc}
.port-chip .port-svc{color:#888;margin-left:.3rem}
.count-pill{background:#2a2d35;border-radius:12px;padding:.1rem .5rem;font-size:.78rem;margin-left:.5rem;color:#aaa}
.card-header-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;flex-wrap:wrap;gap:.5rem}
.card-header-row h2{margin:0}
.filter-row{display:flex;gap:.35rem}
.filter-btn{background:transparent;border:1px solid #2e3138;color:#888;border-radius:5px;padding:.25rem .65rem;font-size:.78rem;cursor:pointer}
.filter-btn.active{border-color:#4a9eff;color:#4a9eff;background:rgba(74,158,255,.08)}
.finding{border:1px solid #2a2d35;border-radius:8px;margin-bottom:.6rem;overflow:hidden}
.finding-header{display:flex;align-items:center;gap:.75rem;padding:.75rem 1rem;cursor:pointer;background:#111316;user-select:none}
.finding-header:hover{background:#14171e}
.sev-pill{padding:.18rem .55rem;border-radius:4px;font-size:.72rem;font-weight:700;min-width:60px;text-align:center}
.sev-CRITICAL{background:rgba(220,50,47,.2);color:#ff5f57}
.sev-HIGH{background:rgba(220,120,30,.2);color:#ff9f43}
.sev-MEDIUM{background:rgba(220,200,30,.2);color:#ffd43b}
.sev-LOW{background:rgba(80,200,120,.2);color:#51cf66}
.sev-INFO{background:rgba(100,100,100,.2);color:#999}
.finding-port{font-family:monospace;font-size:.85rem;color:#4a9eff;min-width:55px}
.finding-service{font-weight:500;font-size:.9rem;color:#e0e0e0;flex:1}
.finding-score{font-size:.8rem;color:#aaa}
.finding-arrow{color:#555;font-size:.75rem;margin-left:auto}
.finding-body{padding:1rem;border-top:1px solid #2a2d35;display:none}
.finding-body.open{display:block}
.finding-banner{font-family:monospace;font-size:.8rem;color:#888;background:#0d0f12;padding:.4rem .65rem;border-radius:4px;margin-bottom:.75rem}
.cve-table{width:100%;border-collapse:collapse;font-size:.82rem;margin-bottom:.75rem}
.cve-table th{color:#666;font-weight:500;text-align:left;padding:.3rem .5rem;border-bottom:1px solid #2a2d35}
.cve-table td{padding:.4rem .5rem;border-bottom:1px solid #1e2028;color:#ccc;vertical-align:top}
.cve-table tr:last-child td{border-bottom:none}
.cve-id{color:#4a9eff;font-family:monospace;white-space:nowrap}
.cve-desc{color:#aaa;font-size:.78rem;max-width:380px}
.mitre-techniques{display:flex;flex-wrap:wrap;gap:.35rem;margin-bottom:.75rem}
.mitre-pill{background:rgba(160,100,255,.12);border:1px solid rgba(160,100,255,.25);color:#b47aff;border-radius:4px;padding:.18rem .55rem;font-size:.75rem;font-family:monospace}
.remediation{background:rgba(74,158,255,.07);border-left:3px solid #1d6fe5;padding:.5rem .75rem;border-radius:0 6px 6px 0;font-size:.82rem;color:#aaa}
.remediation strong{color:#ccc}
</style>
<script>
const socket=io();
let currentScanId=null;
socket.on("vuln_scan_start",d=>{setProgress(5,`Scanning ${d.target} - ${d.port_count} ports...`);setStage("stage-port","active")});
socket.on("vuln_ports_found",d=>{setProgress(40,`Found ${d.count} open port(s) - starting CVE lookup...`);setStage("stage-port","done");setStage("stage-cve","active");renderPortChips(d.open_ports)});
socket.on("vuln_progress",d=>{if(d.stage==="cve_lookup"){setProgress(40+Math.round((d.current/d.total)*40),d.message)}});
socket.on("vuln_scan_complete",d=>{if(d.scan_id!==currentScanId)return;setProgress(100,`Scan complete - ${d.findings.length} service(s) analysed`);["stage-cve","stage-risk","stage-done"].forEach(s=>setStage(s,"done"));renderResults(d);document.getElementById("scan-btn").disabled=false;document.getElementById("scan-btn").innerHTML="&#9654; Start Scan"});
function startScan(){
  const target=document.getElementById("target-input").value.trim();
  if(!target){alert("Enter a target IP or hostname");return}
  let pr=document.getElementById("range-select").value;
  if(pr==="custom"){pr=document.getElementById("custom-range").value.trim();if(!pr){alert("Enter a custom port range");return}}
  ["findings-card","ports-card","severity-summary"].forEach(id=>document.getElementById(id).style.display="none");
  document.getElementById("findings-container").innerHTML="";
  document.getElementById("port-chips").innerHTML="";
  document.getElementById("report-btn").style.display="none";
  document.getElementById("progress-card").style.display="block";
  ["stage-port","stage-cve","stage-risk","stage-done"].forEach(id=>setStage(id,""));
  setProgress(2,"Connecting...");
  document.getElementById("scan-btn").disabled=true;
  document.getElementById("scan-btn").innerHTML="Scanning...";
  fetch("/api/vuln/scan",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({target,port_range:pr})})
  .then(r=>r.json()).then(d=>{if(d.error){alert(d.error);resetBtn();return}currentScanId=d.scan_id})
  .catch(e=>{alert("Failed: "+e);resetBtn()});
}
function renderPortChips(ports){
  document.getElementById("port-chips").innerHTML=ports.map(p=>`<span class="port-chip"><strong>${p.port}</strong><span class="port-svc">${p.service}</span></span>`).join("");
  document.getElementById("ports-count").textContent=ports.length;
  document.getElementById("ports-card").style.display="block";
}
function renderResults(data){
  document.getElementById("severity-summary").style.display="flex";
  ["critical","high","medium","low"].forEach(s=>document.getElementById("badge-"+s).textContent=`${data["total_"+s]} ${s.charAt(0).toUpperCase()+s.slice(1)}`);
  const c=document.getElementById("findings-container"); c.innerHTML="";
  [...data.findings].sort((a,b)=>b.risk_score-a.risk_score).forEach((f,i)=>c.appendChild(buildFinding(f,i)));
  document.getElementById("findings-card").style.display="block";
  document.getElementById("report-btn").style.display="inline-block";
}
function buildFinding(f,idx){
  const d=document.createElement("div"); d.className="finding"; d.dataset.level=f.risk_level;
  const cveRows=f.cves.slice(0,8).map(c=>`<tr><td><span class="cve-id">${c.cve_id}</span></td><td><span class="sev-pill sev-${c.severity}">${c.severity}</span></td><td>${c.cvss_score.toFixed(1)}</td><td class="cve-desc">${c.description.substring(0,120)}</td></tr>`).join("");
  const mitre=f.mitre_techniques.map(([id,name])=>`<span class="mitre-pill" title="${name}">${id}</span>`).join("");
  d.innerHTML=`<div class="finding-header" onclick="toggle(${idx})"><span class="finding-port">:${f.port}</span><span class="finding-service">${f.service}</span>${f.banner?`<span class="finding-score">${f.banner.substring(0,40)}</span>`:""}<span class="sev-pill sev-${f.risk_level}">${f.risk_level}</span><span class="finding-score">CVSS ${f.risk_score}</span><span class="finding-arrow" id="arr-${idx}">&#9660;</span></div><div class="finding-body" id="body-${idx}">${f.banner?`<div class="finding-banner">Banner: ${f.banner}</div>`:""} ${f.cves.length?`<table class="cve-table"><thead><tr><th>CVE</th><th>Severity</th><th>CVSS</th><th>Description</th></tr></thead><tbody>${cveRows}</tbody></table>`:'<p style="color:#666;font-size:.82rem">No CVEs found for this service.</p>'}${mitre?`<div style="margin-bottom:.6rem"><div style="font-size:.75rem;color:#666;margin-bottom:.35rem;text-transform:uppercase">MITRE ATT&CK</div><div class="mitre-techniques">${mitre}</div></div>`:""}<div class="remediation"><strong>Remediation:</strong> ${f.remediation}</div></div>`;
  return d;
}
function toggle(idx){const b=document.getElementById(`body-${idx}`);const a=document.getElementById(`arr-${idx}`);const o=b.classList.toggle("open");a.innerHTML=o?"&#9650;":"&#9660;"}
function filterFindings(l,btn){document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));btn.classList.add("active");document.querySelectorAll(".finding").forEach(el=>el.style.display=(l==="all"||el.dataset.level===l)?"block":"none")}
function downloadReport(){if(currentScanId)window.location=`/api/vuln/report/${currentScanId}`}
function setProgress(pct,label){document.getElementById("progress-fill").style.width=pct+"%";document.getElementById("progress-pct").textContent=pct+"%";document.getElementById("progress-label").textContent=label}
function setStage(id,cls){const el=document.getElementById(id);el.classList.remove("active","done");if(cls)el.classList.add(cls)}
function resetBtn(){document.getElementById("scan-btn").disabled=false;document.getElementById("scan-btn").innerHTML="&#9654; Start Scan"}
document.getElementById("range-select").addEventListener("change",e=>{document.getElementById("custom-range-group").style.display=e.target.value==="custom"?"block":"none"});
</script>

</body>
</html>
